<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' https://www.unpkg.com 'unsafe-inline'; connect-src *;">
<title>TRPG Sheet Dice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  .config { background: #1a1a1a; border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid #333; }
  .config label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
  .config input { flex: 1; background: #0d0d0d; border: 1px solid #333; border-radius: 4px; color: #e8e8e8; font-size: 11px; padding: 5px 8px; font-family: 'Courier New', monospace; }
  .config input:focus { outline: none; border-color: #c9a84c; }
  .status { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.3s; }
  .status.connected { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
  .status.error { background: #f87171; }
  #toasts { position: fixed; bottom: 16px; left: 16px; display: flex; flex-direction: column-reverse; gap: 8px; z-index: 9999; pointer-events: none; }
  .toast { background: rgba(14,10,4,0.96); border: 1px solid #3a2a10; border-radius: 8px; padding: 10px 14px; min-width: 220px; max-width: 300px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; pointer-events: auto; }
  .toast.legendary { border-color: #c9a84c; }
  .toast.catastrophic { border-color: #8b0000; }
  .toast.fadeout { animation: fadeOut 0.4s ease forwards; }
  .toast-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .toast-char { font-size: 11px; color: #c9a84c; font-weight: 600; }
  .toast-system { font-size: 9px; color: #444; text-transform: uppercase; }
  .toast-body { display: flex; align-items: baseline; gap: 8px; }
  .toast-number { font-size: 32px; font-weight: 900; color: #e8e8e8; line-height: 1; font-family: 'Courier New', monospace; }
  .toast.legendary .toast-number { color: #ffd700; text-shadow: 0 0 10px #ffd70088; }
  .toast.catastrophic .toast-number { color: #f87171; }
  .toast-expr { font-size: 10px; color: #555; font-family: 'Courier New', monospace; }
  .toast-label { font-size: 10px; font-weight: 600; margin-top: 2px; }
  .toast.legendary .toast-label { color: #c9a84c; }
  .toast.catastrophic .toast-label { color: #f87171; }
  .toast-label.hit { color: #4ade80; }
  .toast-label.partial { color: #facc15; }
  .toast-label.miss { color: #f87171; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-20px); } }
</style>
</head>
<body>
<div class="config" id="config">
  <div class="status" id="status"></div>
  <label>API URL</label>
  <input type="text" id="apiUrl" placeholder="https://your-backend.railway.app/api" />
</div>
<div id="toasts"></div>
<script src="https://www.unpkg.com/@owlbear-rodeo/sdk@2.9.2/lib/index.js"></script>
<script src="https://jamestepza007.github.io/owlbear/app.js"></script>
</body>
</html>
